version: '3.8'

networks:
  petnet:
    driver: overlay

volumes:
  postgres_data:
  redis_data:

configs:
  nginx_conf:
    file: ./nginx-conf/default.conf

secrets:
  db_password:
    external: true
  postgres_password:
    external: true

services:
  frontend:
    image: 192.168.88.130:5000/frontend:1.3
    ports:
      - "80:80"
    networks:
      - petnet
    deploy:
      mode: global
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf

  php:
    image: 192.168.88.130:5000/php-backend:1.0
    networks:
      - petnet
    environment:
      REDIS_HOST: redis
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: petdb
      DB_USER: petuser
      DB_PASSWORD_FILE: /run/secrets/db_password
    deploy:
      mode: replicated
      replicas: 2
      placement:
        max_replicas_per_node: 1
        constraints:
          - node.platform.os == linux
      resources:
        limits:
          cpus: '0.8'
          memory: 512M
        reservations:
          cpus: '0.4'
          memory: 256M
    secrets:
      - db_password

  postgres:
    image: postgres:16-alpine
    networks:
      - petnet
    environment:
      POSTGRES_DB: petdb
      POSTGRES_USER: petuser
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    secrets:
      - postgres_password
    command: >
      sh -c "export POSTGRES_PASSWORD=$$(cat /run/secrets/postgres_password) && exec docker-entrypoint.sh postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petuser -d petdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - petnet
    volumes:
      - redis_data:/data
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5