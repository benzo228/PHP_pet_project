version: '3.8'

networks:
  petnet:
    driver: overlay

volumes:
  postgres_data:
  redis_data:

services:
  frontend:
    image: 192.168.88.130:5000/frontend:1.3
    ports:
      - "80:80"
    networks:
      - petnet
    deploy:
      replicas: 3
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf

  php:
    image: 192.168.88.130:5000/php-backend:1.0
    networks:
      - petnet
    environment:
      REDIS_HOST: redis
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: petdb
      DB_USER: petuser
      DB_PASSWORD: petpass
    deploy:
      replicas: 2

  postgres:
    image: postgres:16-alpine
    networks:
      - petnet
    environment:
      POSTGRES_DB: petdb
      POSTGRES_USER: petuser
      POSTGRES_PASSWORD: petpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      placement:
        constraints: [node.role == manager]

  redis:
    image: redis:7-alpine
    networks:
      - petnet
    volumes:
      - redis_data:/data
    deploy:
      placement:
        constraints: [node.role == manager]

configs:
  nginx_conf:
    file: ./nginx-conf/default.conf