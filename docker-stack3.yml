version: '3.8'

networks:
  petnet:
    driver: overlay

volumes:
  postgres_data:
  redis_data:

configs:
  nginx_conf:
    file: ./nginx-conf/default.conf

secrets:
  db_password:
    external: true
  postgres_password:
    external: true

services:
  frontend:
    image: 192.168.88.130:5000/frontend:1.3
    ports:
      - "80:80"
    networks:
      - petnet
    deploy:
      mode: global
      update_config:
        parallelism: 1                  # обновляем по одной ноде за раз
        delay: 35s
        order: start-first              # zero‑downtime
        failure_action: rollback        # при ошибке откатить
        monitor: 30s                    # время наблюдения за здоровьем
        max_failure_ratio: 0.3          # если >30% реплик упали — откат
      rollback_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: pause
        monitor: 30s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  php:
    image: 192.168.88.130:5000/php-backend:1.0
    networks:
      - petnet
    environment:
      REDIS_HOST: redis
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: petdb
      DB_USER: petuser
      DB_PASSWORD_FILE: /run/secrets/db_password
    deploy:
      mode: replicated
      replicas: 2
      placement:
        max_replicas_per_node: 1
        constraints:
          - node.platform.os == linux
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
        monitor: 45s
        max_failure_ratio: 0.5
      rollback_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: pause
        monitor: 30s
      resources:
        limits:
          cpus: '0.8'
          memory: 512M
        reservations:
          cpus: '0.4'
          memory: 256M
    secrets:
      - db_password
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    networks:
      - petnet
    environment:
      POSTGRES_DB: petdb
      POSTGRES_USER: petuser
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 60s                       # большая задержка для базы
        order: stop-first                # для stateful безопаснее stop-first
        failure_action: pause            # не откатывать автоматически, а приостановить
        monitor: 1m
      rollback_config:
        parallelism: 1
        delay: 30s
        order: stop-first
        failure_action: pause
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    secrets:
      - postgres_password
    command: >
      sh -c "export POSTGRES_PASSWORD=$$(cat /run/secrets/postgres_password) && exec docker-entrypoint.sh postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petuser -d petdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - petnet
    volumes:
      - redis_data:/data
    deploy:
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 30s
        order: stop-first
        failure_action: pause
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 15s
        order: stop-first
        failure_action: pause
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5