---
- name: Создать директории для мониторинга на менеджере
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ prometheus_config_dir }}"
    - "{{ grafana_data_dir }}"
  delegate_to: localhost
  run_once: true

- name: Скопировать конфигурацию Prometheus из шаблона
  template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/prometheus.yml"
    mode: '0644'
  delegate_to: localhost
  run_once: true

- name: Скопировать файл provisioning для Grafana datasource
  copy:
    src: datasource.yml
    dest: /tmp/datasource.yml
    mode: '0644'
  delegate_to: localhost
  run_once: true

- name: Создать compose-файл стека мониторинга из шаблона
  template:
    src: stack-monitoring.yml.j2
    dest: "/tmp/stack-monitoring.yml"
    mode: '0644'
  delegate_to: localhost
  run_once: true

- name: Задеплоить стек мониторинга в Docker Swarm
  community.docker.docker_stack:
    name: "{{ monitoring_stack_name }}"
    compose:
      - "/tmp/stack-monitoring.yml"
    state: present
  register: stack_output
  delegate_to: "{{ swarm_manager_ip }}"
  run_once: true

- name: Показать результат развертывания стека
  debug:
    var: stack_output
  run_once: true
