server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Статика (фронтенд)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API на PHP
    location /api/ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
        include fastcgi_params;
    }
}