server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Эндпоинт для healthcheck (не проксируется, отвечает сразу)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Статика (фронтенд) – как у вас было
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API на PHP (как у вас)
    location /api/ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
        include fastcgi_params;
    }
}
